name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and test (Linux)
        if: runner.os == 'Linux'
        run: make ci

      - name: Build and test (Windows)
        if: runner.os == 'Windows'
        run: |
          go vet ./...
          go test ./... -timeout 60s
          go build -o bin/dops.exe .
